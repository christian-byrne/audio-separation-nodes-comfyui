name: Bug Report
description: Report a bug with Audio Separation Nodes
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Load workflow with ...
        2. Connect nodes ...
        3. Execute ...
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages or logs if applicable.
    validations:
      required: true
  - type: input
    id: comfyui-version
    attributes:
      label: ComfyUI version
      placeholder: "e.g., latest, commit hash, or release tag"
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g., Windows 11, Ubuntu 24.04, macOS 15"
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "e.g., 3.11.9"
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or workflow files.
