[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "audio-separation-nodes-comfyui"
version = "2.0.0"
description = "Audio stem separation for ComfyUI: split into vocals, bass, drums, and other, plus tools for recombining, tempo matching, and slicing."
readme = "README.md"
requires-python = ">=3.9"
license = { file = "LICENSE" }

authors = [
  { name = "Christian Byrne" }
]

keywords = ["audio", "stem-separation", "music", "comfyui", "ai", "torch"]

dependencies = [
  "numpy>=1.23",
  "librosa>=0.10.2,<1.0",
  "torchaudio>=2.3.0",
  "moviepy>=1.0.3"
]

[project.optional-dependencies]
test = [
  "pytest>=7.4",
  "pytest-cov>=4.1"
]
dev = [
  "ruff>=0.5",
  "mypy>=1.8"
]

[project.urls]
Repository = "https://github.com/christian-byrne/audio-separation-nodes-comfyui"

# --------------------------------------------------
# Pytest
# --------------------------------------------------
[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=src --cov-report=term-missing --cov-fail-under=90"

# --------------------------------------------------
# Ruff (lint + import sorting)
# --------------------------------------------------
[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "TCH"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-third-party = [
  "torch",
  "torchaudio",
  "librosa",
  "numpy",
  "moviepy",
  "comfy",
  "comfy_api",
  "folder_paths"
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402"]

# --------------------------------------------------
# MyPy
# --------------------------------------------------
[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

# --------------------------------------------------
# ComfyUI Registry Metadata
# --------------------------------------------------
[tool.comfy]
PublisherId = "christian-byrne"
DisplayName = "Audio Separation Nodes"
Icon = "https://img.icons8.com/?size=100&id=gSULe4iJTpL&format=png&color=000000"
